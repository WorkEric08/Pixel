
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Pixel Line — Seu contador de dias pixelado e jornada de metas.">
    
    <!-- PWA / iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pixel Line">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
    
    <title>Pixel Line — Contador de Dias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --frame: #1e293b;
            --accent: #22c55e;
            --danger: #dc2626;
            --action: #2563eb;
            --event: #8b5cf6;
            --secondary: #475569;
            --container: #334155;
            --highlight: #14b34e;
            --borders: #036564;
            --text: #f8fafc;
            --header-bg: rgba(30, 41, 59, 0.4);
            
            /* Pixel colors */
            --pixel-past: #0b3b26;
            --pixel-future: #1e293b;
            --pixel-weekend: #334155;
            --pixel-today: #22c55e;
            --pixel-target: #ffffff;
            --pixel-event: #8b5cf6;
            --pixel-special: #ffffff;
            --pixel-border: rgba(0, 0, 0, 0.3);

            /* Dynamic Glow Variables (will be set by JS) */
            --pixel-today-glow: rgba(34, 197, 94, 0.6);
            --pixel-target-glow: rgba(255, 255, 255, 0.7);
            --pixel-event-glow: rgba(139, 92, 246, 0.6);

            /* Picker Thumb Color */
            --pixel-thumb: #e2e8f0;

            /* Safe area insets */
            --sab: env(safe-area-inset-bottom, 0px);
            --sat: env(safe-area-inset-top, 0px);
        }

        :root.light {
            --bg: #f4f7fb;
            --frame: #ffffff;
            --accent: #10b981;
            --danger: #ef4444;
            --action: #3b82f6;
            --event: #7c3aed;
            --secondary: #64748b;
            --container: #e2e8f0;
            --highlight: #059669;
            --borders: #cbd5e1;
            --text: #0f172a;
            --header-bg: rgba(255, 255, 255, 0.7);
            
            /* Pixel colors light */
            --pixel-past: #d1fae5;
            --pixel-future: #e2e8f0;
            --pixel-weekend: #cbd5e1;
            --pixel-today: #10b981;
            --pixel-target: #0f172a;
            --pixel-event: #7c3aed;
            --pixel-special: #0f172a;
            --pixel-border: rgba(0, 0, 0, 0.05);
        }

        /* ===== PWA Native Behavior ===== */
        html {
            overscroll-behavior: none;
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
            height: 100%;
            /* Prevent pull-to-refresh */
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #020617;
            color: var(--text);
            margin: 0;
            padding: 0;
            overscroll-behavior: none;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            /* Disable pull-to-refresh */
            -webkit-overflow-scrolling: touch;
        }

        /* Prevent text selection on UI elements (not inputs) */
        button, label, span, h1, h2, h3, h4, h5, h6, p, div, header, footer, nav {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Allow text selection on inputs and textareas */
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
            -webkit-touch-callout: default;
        }

        /* Prevent context menu on long press */
        img, a {
            -webkit-touch-callout: none;
        }

        /* Prevent tap highlight */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Smooth scroll behavior for app containers */
        #root {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== End PWA Native ===== */

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        .custom-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
        }

        /* Pixel Styling - Solid Colors with targeted Glow */
        .pixel-border-style {
            border: 1px solid var(--pixel-border);
            position: relative;
        }

        .pixel-past { 
            background-color: var(--pixel-past);
            opacity: 0.8;
        }
        
        .pixel-future { 
            background-color: var(--pixel-future);
        }

        .pixel-weekend { 
            background-color: var(--pixel-weekend);
            opacity: 0.9;
        }
        
        .pixel-today { 
            background-color: var(--pixel-today);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px var(--pixel-today-glow);
            z-index: 10;
        }

        .pixel-target { 
            background-color: var(--pixel-target);
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 0 12px var(--pixel-target-glow);
            z-index: 10;
        }

        .pixel-event { 
            background-color: var(--pixel-event);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px var(--pixel-event-glow);
            z-index: 10;
        }

        .pixel-special {
            background-color: var(--pixel-special);
        }

        /* Utility to remove glow in legend or specific places */
        .pixel-no-glow {
            box-shadow: none !important;
        }

        /* Custom Range Input Styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--pixel-thumb);
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            margin-top: -2px;
        }

        /* Splash Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes pixel-reveal {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .animate-scan {
            animation: scanline 4s linear infinite;
        }
        
        .animate-reveal {
            animation: pixel-reveal 0.5s ease-out forwards;
        }

        /* Safe area padding for PWA bottom bar */
        @supports (padding: max(0px)) {
            .pwa-safe-bottom {
                padding-bottom: max(1.5rem, env(safe-area-inset-bottom, 12px));
            }
        }

        /* Standalone mode specific styles */
        @media all and (display-mode: standalone) {
            body {
                /* Extra padding for status bar */
                padding-top: env(safe-area-inset-top, 0px);
            }
        }


    </style>
<script type="importmap">
